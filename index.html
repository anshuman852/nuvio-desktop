<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuvio Desktop</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Disabilita context menu e selezione testo stile app nativa -->
    <style>
      * { -webkit-user-select: none; user-select: none; }
      input, textarea { -webkit-user-select: text; user-select: text; }
      body { margin: 0; background: #0a0a0f; overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  
  <script>
    // Disabilita right-click del browser ovunque - le card usano onContextMenu React
    document.addEventListener('contextmenu', function(e) {
      // Permetti right-click solo su elementi con data-content-menu
      if (!e.target.closest('[data-context-menu]')) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
