  <!doctype html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
      />
      <title>Nuvio Desktop</title>
      <style>
        /* user-select is handled in index.css */
        html, body { margin: 0; background: #0a0a0f; overflow: hidden; }
        /* When MPV is rendering native video, the entire DOM chain must be
           transparent so WebView2's transparent pixels reveal the libmpv
           child HWND beneath. */
        body.mpv-active,
        body.mpv-active html { background: transparent !important; }
        body.mpv-active #root { display: none !important; }
        
        /* 🔥 Rimuove eventuali warning Tauri */
        .tauri-warning, 
        [class*="tauri-warning"] {
          display: none !important;
          visibility: hidden !important;
          opacity: 0 !important;
          pointer-events: none !important;
        }
      </style>
    </head>
    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
      <script>
        // 🔥 RIMOZIONE DEFINITIVA DEL WARNING TAURI
        (function() {
          // Funzione per rimuovere i warning
          function removeTauriWarnings() {
            var elements = document.querySelectorAll('.tauri-warning, [class*="tauri-warning"]');
            for (var i = 0; i < elements.length; i++) {
              elements[i].remove();
            }
          }
          
          // Osserva le modifiche al DOM
          var observer = new MutationObserver(function(mutations) {
            removeTauriWarnings();
          });
          
          // Avvia l'osservatore non appena il body esiste
          if (document.body) {
            observer.observe(document.body, { childList: true, subtree: true });
            removeTauriWarnings();
          } else {
            document.addEventListener('DOMContentLoaded', function() {
              observer.observe(document.body, { childList: true, subtree: true });
              removeTauriWarnings();
            });
          }
          
          // Context menu is handled by React components
          
          console.log('[Index] Environment check - Protocol:', window.location.protocol);
          console.log('[Index] Is Tauri:', window.location.protocol === 'tauri:' || navigator.userAgent.includes('Tauri'));
        })();
      </script>
    </body>
  </html>
