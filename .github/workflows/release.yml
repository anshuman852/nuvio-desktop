name: Release

on:
  push:
    tags:
      - 'v*'

# Permessi espliciti per creare Release
permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download mpv (bundled sidecar)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          $url = "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20240901/mpv-x86_64-20240901-git-21a5e05.7z"
          Invoke-WebRequest -Uri $url -OutFile mpv.7z
          7z e mpv.7z mpv.exe -o"src-tauri/binaries/" -y
          Rename-Item "src-tauri/binaries/mpv.exe" "mpv-x86_64-pc-windows-msvc.exe"

      - name: Install Node dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Nuvio Desktop ${{ github.ref_name }}'
          releaseBody: |
            ## Nuvio Desktop ${{ github.ref_name }}

            Client Windows per l'ecosistema Stremio/Nuvio — **mpv incluso, nessuna dipendenza esterna**.

            ### Installazione
            1. Scarica `NuvioDesktop_0.1.0_x64-setup.exe` qui sotto
            2. Esegui il wizard — nient'altro da installare ✅

            ### Requisiti
            - Windows 10/11 (64-bit)
          releaseDraft: false
          prerelease: false